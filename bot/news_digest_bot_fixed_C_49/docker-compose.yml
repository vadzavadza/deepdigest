services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file:
      - .env
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./debug_runs:/app/debug_runs
      - ./eval_fixtures:/app/eval_fixtures
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file:
      - .env
    command: python -m app.scheduler_runner
    volumes:
      - ./debug_runs:/app/debug_runs
      - ./eval_fixtures:/app/eval_fixtures
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: newsbot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d newsbot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
